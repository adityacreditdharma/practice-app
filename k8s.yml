apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-gke-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-gke
  template:
    metadata:
      labels:
        app: hello-gke
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: hello-gke-node
          image: asia-south1-docker.pkg.dev/sivasi/node-repo/hello-gke-node:v1
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hello-gke-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: LoadBalancer
  selector:
    app: hello-gke
  ports:
    - port: 80
      targetPort: 8080